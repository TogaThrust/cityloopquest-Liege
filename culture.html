<script>
function initCulturePage() {
  if (window.translationManager?.isLoaded) {
    window.languageSelector?.createSelector?.();
    window.languageSelector?.updateSelectorValue?.();
  } else {
    setTimeout(initCulturePage, 100);
  }
}
function goToCulturePage(target, requiresFull) {
  if (requiresFull && window.checkPageAccess && !window.checkPageAccess(target)) return;
  window.location.href = target;
}
document.addEventListener('DOMContentLoaded', () => {
  initCulturePage();
  function normalizeLang(lang) {
    lang = String(lang || localStorage.getItem('selectedLanguage') || 'fr').toLowerCase();
    if (lang === 'jp') return 'ja';
    if (lang === 'zh') return 'cn';
    return lang;
  }
  function pickTitle(map, lang) {
    const exact = map && map[lang];
    if (exact != null && String(exact).trim() !== "") return exact;
    if (map && map.fr && String(map.fr).trim() !== "") return map.fr;
    if (map && map.en && String(map.en).trim() !== "") return map.en;
    return "";
  }
  function resolveLang(event) {
    const stored = normalizeLang(localStorage.getItem('selectedLanguage') || '');
    const fromEvent = event?.detail?.language;
    if (fromEvent) return normalizeLang(fromEvent);
    return stored || 'fr';
  }
  function applyCultureLabels(event) {
    const lang = resolveLang(event);
    document.querySelectorAll('[data-title-i18n]').forEach((el) => {
      try {
        const map = JSON.parse(el.getAttribute('data-title-i18n') || '{}');
        const label = pickTitle(map, lang);
        if (label) el.textContent = (el.getAttribute('data-title-prefix') || '') + label;
      } catch (_) {}
    });
  }
  document.addEventListener('languageChanged', applyCultureLabels);
  applyCultureLabels();
  document.querySelectorAll('[data-culture-target]').forEach((btn) => {
    btn.addEventListener('click', () => goToCulturePage(btn.dataset.cultureTarget, btn.dataset.requiresFull === '1'));
  });
  const backButton = document.getElementById('back-button');
  if (backButton) backButton.addEventListener('click', () => { window.location.href = 'main.html'; });
});
</script>
